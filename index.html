<script>
(function(){
  var FC={apiKey:"AIzaSyA97NUwYdx4HkmAbxaRU1QvVufP-DVbdKo",authDomain:"onestepatatime-a642b.firebaseapp.com",projectId:"onestepatatime-a642b",storageBucket:"onestepatatime-a642b.firebasestorage.app",messagingSenderId:"354469520222",appId:"1:354469520222:web:88317eb8c1912a3fcbe5cf"};
  firebase.initializeApp(FC);
  var auth=firebase.auth();
  var db=firebase.firestore();
  var uns=null;
  var EM={'auth/invalid-credential':'אימייל או סיסמה שגויים','auth/email-already-in-use':'אימייל כבר קיים','auth/weak-password':'סיסמה חלשה','auth/invalid-email':'אימייל לא תקין'};
  auth.onAuthStateChanged(function(user){
    if(user){
      window.__fbUser=user;
      document.getElementById('authScreen').style.display='none';
      document.getElementById('appShell').style.display='flex';
      document.getElementById('userEmail').textContent=user.email;
      if(uns)uns();
      uns=db.doc('users/'+user.uid).onSnapshot(function(snap){
        if(snap.exists){
          window.State.mergeRemote(snap.data());
          if(window.currentPage)window.renderPage(window.currentPage);
          window.updateUI();
        }
      });
    } else {
      window.__fbUser=null;
      if(uns){uns();uns=null;}
      document.getElementById('authScreen').style.display='flex';
      document.getElementById('appShell').style.display='none';
    }
  });
  window.fbLogin=function(e,p){
    return auth.signInWithEmailAndPassword(e,p).catch(function(err){
      throw new Error(EM[err.code]||err.code);
    });
  };
  window.fbRegister=function(e,p){
    return auth.createUserWithEmailAndPassword(e,p).catch(function(err){
      throw new Error(EM[err.code]||err.code);
    });
  };
  window.fbLogout=function(){return auth.signOut();};
  window.fbSave=function(data){
    if(!window.__fbUser)return Promise.resolve();
    return db.doc('users/'+window.__fbUser.uid).set(data,{merge:true});
  };
})();
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--bg4:#212136;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --txt:#f0f0f8;--txt2:#8888aa;
  --accent:#7c6dfa;--accent2:#a78bfa;
  --green:#22d3a5;--red:#f75a6e;--orange:#f97316;
  --yellow:#fbbf24;--blue:#38bdf8;--pink:#f472b6;
  --radius:14px;--radius-sm:8px;
}
html,body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}

/* AUTH */
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-tabs{display:flex;margin-bottom:20px;background:var(--bg3);border-radius:var(--radius-sm);padding:3px}
.auth-tab{flex:1;padding:9px;text-align:center;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;color:var(--txt2);transition:all .15s}
.auth-tab.active{background:var(--accent);color:#fff}
#authError{color:var(--red);font-size:13px;margin-bottom:10px;display:none;text-align:center;padding:8px;background:rgba(247,90,110,0.1);border-radius:var(--radius-sm)}

/* APP SHELL */
#appShell{display:none;flex-direction:column;min-height:100vh}

/* TOP BAR */
#topbar{position:sticky;top:0;z-index:100;background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top))}
.topbar-row{display:flex;justify-content:space-between;align-items:center}
.date-main{font-size:16px;font-weight:800}
.date-heb{font-size:11px;color:var(--txt2);margin-top:1px}
.score-badge{background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;padding:4px 12px;font-size:13px;font-weight:800;color:#fff;display:flex;align-items:center;gap:5px}
.user-mini{display:flex;align-items:center;gap:6px;margin-top:5px;font-size:11px;color:var(--txt2)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
.sync-dot.syncing{background:var(--yellow)}.sync-dot.offline{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* MAIN */
#main{flex:1;padding:12px 13px;padding-bottom:calc(72px + env(safe-area-inset-bottom))}

/* BOTTOM NAV */
#bottomNav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0 calc(6px + env(safe-area-inset-bottom))}
.bnav{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;border-radius:8px;cursor:pointer;color:var(--txt2);font-size:10px;font-weight:600;border:none;background:none;min-width:44px;-webkit-tap-highlight-color:transparent;transition:color .15s}
.bnav i{font-size:19px}
.bnav.active{color:var(--accent2)}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:11px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt2);margin-bottom:11px;display:flex;align-items:center;gap:6px}
.card-title i,.card-title .ti{color:var(--accent2);font-size:13px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* METRIC */
.metric{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 10px;text-align:center}
.metric .val{font-size:24px;font-weight:800;line-height:1.1}
.metric .lbl{font-size:10px;color:var(--txt2);margin-top:3px;font-weight:500}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:var(--radius-sm);font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;-webkit-tap-highlight-color:transparent}
.btn-p{background:var(--accent);color:#fff}
.btn-g{background:var(--bg3);color:var(--txt2);border:1px solid var(--border)}
.btn-d{background:rgba(247,90,110,.12);color:var(--red);border:1px solid rgba(247,90,110,.3)}
.btn-gr{background:rgba(34,211,165,.12);color:var(--green);border:1px solid rgba(34,211,165,.3)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-full{width:100%}

/* INP */
.inp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--txt);padding:10px 13px;font-family:'Heebo',sans-serif;font-size:15px;margin-bottom:9px;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--accent)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;line-height:1.6;min-height:80px}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;color:var(--txt2);margin-bottom:4px;font-weight:600}

/* TAGS */
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.tag-g{background:rgba(34,211,165,.15);color:var(--green)}
.tag-r{background:rgba(247,90,110,.15);color:var(--red)}
.tag-o{background:rgba(249,115,22,.15);color:var(--orange)}
.tag-b{background:rgba(56,189,248,.15);color:var(--blue)}
.tag-y{background:rgba(251,191,36,.15);color:var(--yellow)}
.tag-p{background:rgba(124,109,250,.15);color:var(--accent2)}

/* PROGRESS */
.pbar{height:6px;border-radius:3px;background:var(--bg4);overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .4s}

/* HABIT ROW */
.hrow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.hrow:last-child{border-bottom:none}
.hcheck{width:28px;height:28px;border-radius:50%;border:2px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;transition:all .15s;color:transparent;-webkit-tap-highlight-color:transparent}
.hcheck.done{background:var(--green);border-color:var(--green);color:#fff}
.hcheck.done-bad{background:var(--red);border-color:var(--red);color:#fff}

/* TASK ROW */
.trow{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
.trow:last-child{border-bottom:none}
.tcheck{width:26px;height:26px;border-radius:6px;border:2px solid var(--border2);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px;color:transparent;-webkit-tap-highlight-color:transparent}
.tcheck.done{background:var(--accent);border-color:var(--accent);color:#fff}
.tpts{font-size:10px;color:var(--accent2);font-weight:700;margin-right:auto}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:20px 20px 0 0;padding:22px 18px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:20px;padding:4px}

/* TOAST */
.toast{position:fixed;top:75px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 20px;font-size:14px;font-weight:500;z-index:9999;white-space:nowrap;animation:tIn .2s ease}
.toast.success{border-color:var(--green);color:var(--green)}
.toast.error{border-color:var(--red);color:var(--red)}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* URGENT BANNER */
.urgent{background:linear-gradient(135deg,rgba(247,90,110,.18),rgba(247,90,110,.06));border:1.5px solid rgba(247,90,110,.45);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;cursor:pointer}
.urgent .ul{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:3px}
.urgent .ut{font-size:15px;font-weight:700}
.urgent .ud{font-size:11px;color:var(--red);margin-top:3px;font-weight:600}

/* SCORE RING */
.score-ring{width:80px;height:80px;border-radius:50%;border:4px solid var(--bg4);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto}
.score-ring .sn{font-size:22px;font-weight:900;color:var(--accent2)}
.score-ring .sl{font-size:10px;color:var(--txt2);margin-top:1px}

/* EXERCISE COLLAPSE */
.ex-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden}
.ex-header{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer}
.ex-body{padding:0 13px 12px;display:none}
.ex-body.open{display:block}
.sets-t{width:100%;font-size:13px;border-collapse:collapse}
.sets-t th,.sets-t td{text-align:center;padding:5px 6px}
.sets-t th{color:var(--txt2);font-weight:600}
.sinp{width:58px;background:var(--bg4);border:1px solid var(--border);border-radius:5px;color:var(--txt);padding:4px 5px;text-align:center;font-family:'Heebo',sans-serif;font-size:13px}

/* RULE CARD */
.rcard{background:var(--bg3);border-radius:var(--radius-sm);border-right:3px solid var(--accent);padding:11px 13px;margin-bottom:7px;display:flex;align-items:flex-start;gap:9px}
.rnum{color:var(--accent2);font-weight:800;font-size:14px;min-width:20px}

/* HEALTH ITEM */
.hitem{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;display:flex;align-items:center;gap:9px;margin-bottom:7px}

/* DAILY TIP */
.tip-box{background:linear-gradient(135deg,rgba(124,109,250,.12),rgba(167,139,250,.05));border:1px solid rgba(124,109,250,.22);border-radius:var(--radius);padding:13px 14px;margin-bottom:12px}
.tip-box .tl{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--accent2);text-transform:uppercase;margin-bottom:4px}
.tip-box .tt{font-size:13px;line-height:1.6}

/* ICON BTN */
.ibtn{background:none;border:none;color:var(--txt2);cursor:pointer;padding:5px;border-radius:5px;font-size:13px}

/* SECTION LABEL */
.slbl{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:1px;margin:14px 0 7px}

/* STREAK BAR */
.sbar{display:flex;gap:4px;margin-top:8px}
.sday{width:14px;height:14px;border-radius:3px;flex-shrink:0}

/* MOTIVATION QUOTE */
.mquote{text-align:center;padding:16px 10px;font-size:15px;line-height:1.7;color:var(--txt2);font-style:italic}

/* CHART CONTAINER */
.chart-wrap{position:relative;height:180px;margin-top:10px}

canvas{max-width:100%}
</style>
</head>

// ===== HEBREW DATE =====
function hebrewDate(){
  try{
    const f=new Intl.DateTimeFormat('he-IL-u-ca-hebrew',{day:'numeric',month:'long',year:'numeric'}).format(new Date());
    // Convert digits to Hebrew letters
    const nums={'1':'א׳','2':'ב׳','3':'ג׳','4':'ד׳','5':'ה׳','6':'ו׳','7':'ז׳','8':'ח׳','9':'ט׳',
      '10':'י׳','11':'י״א','12':'י״ב','13':'י״ג','14':'י״ד','15':'ט״ו','16':'ט״ז','17':'י״ז','18':'י״ח','19':'י״ט',
      '20':'כ׳','21':'כ״א','22':'כ״ב','23':'כ״ג','24':'כ״ד','25':'כ״ה','26':'כ״ו','27':'כ״ז','28':'כ״ח','29':'כ״ט','30':'ל׳'};
    const years={'5784':'תשפ״ד','5785':'תשפ״ה','5786':'תשפ״ו','5787':'תשפ״ז','5788':'תשפ״ח','5789':'תשפ״ט','5790':'תש״צ'};
    return f.replace(/\d+/g,n=>{const num=parseInt(n);if(years[num])return years[num];if(nums[num])return nums[num];return n;});

}

function deepMerge(t,s){
  for(const k of Object.keys(s)){
    if(s[k]&&typeof s[k]==='object'&&!Array.isArray(s[k])){
      if(!t[k])t[k]={};deepMerge(t[k],s[k]);
    } else t[k]=s[k];
  }
  return t;
}

window.State={
  data:JSON.parse(JSON.stringify(DEF)),
  _t:null,
  mergeRemote(r){
    const today=todayKey();
    // שמור מה שסימנו מקומית היום (לפני מיזוג)
    const localDailyToday=JSON.parse(JSON.stringify(this.data.dailyLog[today]||{}));
    const localHabitToday=JSON.parse(JSON.stringify((this.data.habitLog||{})[today]||{}));
    const localLastSave=this.data._lastSaveDate||'';

    deepMerge(this.data,r);
    // תבניות אימון — תמיד מהקוד, לא מ-Firebase
    // בדוק כמות: אם Firebase יש פחות מ-8 תבניות — החזר מהקוד
    if(!this.data.workoutTemplates||this.data.workoutTemplates.length<8){
      this.data.workoutTemplates=JSON.parse(JSON.stringify(DEF.workoutTemplates));
    }
    // בדוק איכות: אם אין A1/B4 או אם יש תבנית ריקה — החזר מהקוד
    const tplIds=(this.data.workoutTemplates||[]).map(t=>t.id);
    const hasEmpty=(this.data.workoutTemplates||[]).some(t=>!t.exercises||t.exercises.length===0);
    if(!tplIds.includes('A1')||!tplIds.includes('B4')||hasEmpty){
      this.data.workoutTemplates=JSON.parse(JSON.stringify(DEF.workoutTemplates));
    }

    if(!this.data.dailyLog)this.data.dailyLog={};
    if(!this.data.habitLog)this.data.habitLog={};

    // אם Firebase שמר נתונים מיום אחר כ"היום" — נקה אותם
    const remoteSaveDate=(r._lastSaveDate||'');
    if(remoteSaveDate && remoteSaveDate !== today){
      // Firebase הכיל נתונים מיום אחר — היום מתחיל ריק
      this.data.dailyLog[today]={};
      this.data.habitLog[today]={};
    } else {
      // מיזוג רגיל — מה שנעשה מקומית גובר
      const remoteDailyToday=(r.dailyLog||{})[today]||{};
      const remoteHabitToday=(r.habitLog||{})[today]||{};
      this.data.dailyLog[today]=Object.assign({},remoteDailyToday,localDailyToday);
      this.data.habitLog[today]=Object.assign({},remoteHabitToday,localHabitToday);
    }

    // ניקוי ספירות יומיות
    ['smoke','h'].forEach(x=>{
      if(this.data[x].lastDate!==today){
        if(this.data[x].lastDate)this.data[x].history.push({date:this.data[x].lastDate,val:this.data[x].today});
        this.data[x].today=0;this.data[x].lastDate=today;
      }
    });
  },
  save(){
    clearTimeout(this._t);setSyncStatus('syncing');
    this.data._lastSaveDate=todayKey();
    this._t=setTimeout(async()=>{
      try{await window.fbSave(this.data);setSyncStatus('synced');}
      catch(e){setSyncStatus('offline');}
    },900);
  }
};

function todayKey(){return new Date().toISOString().split('T')[0];}
function todayDow(){return new Date().getDay();}
function formatDate(d){try{return new Date(d).toLocaleDateString('he-IL',{day:'numeric',month:'long',year:'numeric'});}catch(e){return d;}}
function formatShort(d){try{return new Date(d).toLocaleDateString('he-IL',{day:'numeric',month:'short'});}catch(e){return d;}}
function genId(){return Date.now()+Math.floor(Math.random()*9999);}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d)-new Date())/(1000*60*60*24));}
function deadlineTag(d){
  const n=daysUntil(d);if(n===null)return'';
  if(n<0)return`<span class="tag tag-r">פג תוקף</span>`;
  if(n===0)return`<span class="tag tag-r">היום!</span>`;
  if(n===1)return`<span class="tag tag-o">מחר</span>`;
  if(n<=3)return`<span class="tag tag-o">עוד ${n} ימים</span>`;
  if(n<=7)return`<span class="tag tag-y">עוד ${n} ימים</span>`;
  return`<span class="tag" style="background:var(--bg4);color:var(--txt2)">עוד ${n} ימים</span>`;
}

// ===== SCORE =====
function calcTodayScore(){
  const today=todayKey(),dow=todayDow();
  const log=window.State.data.dailyLog[today]||{};
  const tasks=window.State.data.dailyTasks||[];
  return tasks.filter(t=>t.days.includes(dow)&&log[t.id]).reduce((s,t)=>s+(t.pts||1),0);
}
function calcTodayMax(){
  const dow=todayDow();
  const tasks=window.State.data.dailyTasks||[];
  return tasks.filter(t=>t.days.includes(dow)).reduce((s,t)=>s+(t.pts||1),0);
}
function calcMonthScore(){
  const now=new Date(),m=now.getMonth(),y=now.getFullYear();
  const log=window.State.data.dailyLog||{};
  const tasks=window.State.data.dailyTasks||[];
  let total=0;
  Object.keys(log).forEach(k=>{
    const d=new Date(k);
    if(d.getMonth()===m&&d.getFullYear()===y){
      const dow=d.getDay();
      const dayLog=log[k]||{};
      total+=tasks.filter(t=>t.days.includes(dow)&&dayLog[t.id]).reduce((s,t)=>s+(t.pts||1),0);
    }
  });
  return total;
}

function moveCat(catIdx, dir){
  const tasks=window.State.data.dailyTasks||[];
  const cats=[...new Set(tasks.map(t=>t.cat))];
  if(dir==='up'&&catIdx===0)return;
  if(dir==='down'&&catIdx===cats.length-1)return;
  const swapIdx=dir==='up'?catIdx-1:catIdx+1;
  const catA=cats[catIdx],catB=cats[swapIdx];
  // Rebuild tasks array with swapped category order
  const catAtasks=tasks.filter(t=>t.cat===catA);
  const catBtasks=tasks.filter(t=>t.cat===catB);
  const others=tasks.filter(t=>t.cat!==catA&&t.cat!==catB);
  // Build new order: for each original cat, replace with swapped
  const newOrder=[];
  let aPlaced=false,bPlaced=false;
  tasks.forEach(t=>{
    if(t.cat===catA&&!aPlaced){newOrder.push(...catBtasks);aPlaced=true;}
    else if(t.cat===catB&&!bPlaced){newOrder.push(...catAtasks);bPlaced=true;}
  });
  // Simpler: just sort all tasks by new cat order
  const newCatOrder=[...cats];
  newCatOrder[catIdx]=catB;
  newCatOrder[swapIdx]=catA;
  window.State.data.dailyTasks=newCatOrder.flatMap(c=>tasks.filter(t=>t.cat===c));
  window.State.save();
  closeModal();
  editCatOrder();
  window.renderPage('daily');
}
function moveTask(id, dir){
  const all = window.State.data.dailyTasks;
  const t = all.find(x => x.id === id);
  if(!t) return;
  const cat = t.cat;
  // עובד רק בתוך אותה קטגוריה
  const catIndexes = all.map((x,i) => x.cat === cat ? i : -1).filter(i => i >= 0);
  const posInCat = catIndexes.findIndex(i => all[i].id === id);
  if(dir === 'up' && posInCat === 0){ toast('כבר ראשון בקטגוריה'); return; }
  if(dir === 'down' && posInCat === catIndexes.length - 1){ toast('כבר אחרון בקטגוריה'); return; }
  const swapPos = dir === 'up' ? posInCat - 1 : posInCat + 1;
  const idxA = catIndexes[posInCat];
  const idxB = catIndexes[swapPos];
  // Swap only within the array — other categories untouched
  const newAll = [...all];
  const tmp = newAll[idxA];
  newAll[idxA] = newAll[idxB];
  newAll[idxB] = tmp;
  window.State.data.dailyTasks = newAll;
  window.State.save();
  window.renderPage('daily');
}

<div style="background:${isWarmup?'rgba(251,191,36,.08)':'rgba(124,109,250,.08)'};border:1.5px solid ${isWarmup?'rgba(251,191,36,.3)':'rgba(124,109,250,.3)'};border-radius:var(--radius);padding:18px;margin-bottom:14px">

function calcNextWeight(lastSets, setIdx, targetReps, fallback){
  if(!lastSets||!lastSets.length)return fallback||0;
  // בדוק שכל הסטים השלימו את מספר החזרות היעד
  const allCompleted=lastSets.every(s=>s.r&&parseInt(s.r)>=parseInt(targetReps));
  const baseW=parseFloat(lastSets[setIdx]?.w||lastSets[0]?.w||fallback||0);
  if(!baseW)return fallback||0;
  // אם כל הסטים הושלמו — העלה ב-5%
  if(allCompleted)return Math.round(baseW*1.05*2)/2; // עיגול ל-0.5
  // אחרת — אותו משקל
  return baseW;
}

function startBotWorkout(tid){
  const tpl=(window.State.data.workoutTemplates||[]).find(t=>t.id===tid);if(!tpl)return;
  const lastW=(window.State.data.workouts||[]).filter(w=>w.templateId===tid).slice(-1)[0];

  const exercises=tpl.exercises.map(ex=>{
    const lastEx=lastW?(lastW.exercises||[]).find(e=>e.name===ex.name):null;
    const lastSets=lastEx?.sets||[];
    const sets=!ex.warmup?[...Array(ex.targetSets||3)].map((_,si)=>({
      targetW: calcNextWeight(lastSets, si, ex.targetReps, ex.lastWeight),
      targetR: ex.targetReps || 10,
      w:0, r:0, done:false
    })):[{targetW:0,targetR:1,w:0,r:0,done:false}];
    return {
      name:ex.name,
      targetSets:ex.targetSets||3,
      targetReps:ex.targetReps||10,
      warmup:!!ex.warmup,
      note:ex.note||'',
      lastSets,
      sets
    };
  });

  window.State.data.activeWorkout={
    id:genId(), templateId:tid, name:tpl.name,
    date:todayKey(), exercises, currentEx:0
  };
  window.State.save();
  window.renderPage('workout');
}

function doneWarmup(){
  const aw=window.State.data.activeWorkout;if(!aw)return;
  aw.exercises[aw.currentEx].sets[0].done=true;
  aw.currentEx++;
  window.State.save();window.renderPage('workout');
}

function doneSet(si){
  const aw=window.State.data.activeWorkout;if(!aw)return;
  const repsInp=document.getElementById('repsinp_'+si);
  const weightInp=document.getElementById('winp_'+si);
  const reps=parseInt(repsInp?.value)||aw.exercises[aw.currentEx].sets[si].targetR;
  const w=parseFloat(weightInp?.value)||aw.exercises[aw.currentEx].sets[si].targetW||0;
  aw.exercises[aw.currentEx].sets[si].r=reps;
  aw.exercises[aw.currentEx].sets[si].w=w;
  aw.exercises[aw.currentEx].sets[si].done=true;
  window.State.save();window.renderPage('workout');
}

function nextExercise(){
  const aw=window.State.data.activeWorkout;if(!aw)return;
  aw.currentEx++;
  window.State.save();window.renderPage('workout');
}

function finishWorkout(){
  const aw=window.State.data.activeWorkout;if(!aw)return;
  const workout={
    id:aw.id, templateId:aw.templateId, name:aw.name, date:aw.date,
    exercises:aw.exercises.map(ex=>({
      name:ex.name, warmup:!!ex.warmup,
      sets:ex.sets.map(s=>({w:s.w||s.targetW,r:s.r||s.targetR}))
    }))
  };
  if(!window.State.data.workouts)window.State.data.workouts=[];
  window.State.data.workouts.push(workout);
  window.State.data.activeWorkout=null;
  window.State.save();
  toast('אימון נשמר! 💪');
  window.renderPage('workout');
}

function cancelWorkout(){
  if(!confirm('לבטל את האימון? הנתונים לא יישמרו'))return;
  window.State.data.activeWorkout=null;
  window.State.save();window.renderPage('workout');
}

function toggleWCard(id){
  const b=document.getElementById('wbody_'+id),c=document.getElementById('wchev_'+id);
  if(!b)return;const o=b.classList.toggle('open');if(c)c.style.transform=o?'rotate(180deg)':'';
}

function delWorkout(id){
  if(!confirm('למחוק אימון?'))return;
  window.State.data.workouts=window.State.data.workouts.filter(w=>w.id!==id);
  window.State.save();window.renderPage('workout');
}

function showExChart(exName,wid){
  const ws=window.State.data.workouts||[];
  const data=[];
  ws.forEach(w=>{
    (w.exercises||[]).forEach(ex=>{
      if(!ex.warmup&&ex.name===exName){
        const best=Math.max(...(ex.sets||[]).map(s=>s.w&&s.r?parseFloat(s.w)*(1+parseFloat(s.r)/30):0).filter(v=>v>0));
        if(best>0)data.push({date:formatShort(w.date),val:Math.round(best)});
      }
    });
  });
  if(data.length<2){toast('צריך לפחות 2 אימונים לגרף','error');return;}
  const container=document.getElementById('chartWrap_'+wid);if(!container)return;
  container.innerHTML=`<div style="font-size:12px;color:var(--txt2);margin-bottom:6px">📈 ${exName} — כוח מוערך (1RM)</div><div class="chart-wrap"><canvas id="ec_${wid}"></canvas></div>`;
  setTimeout(()=>{
    const canvas=document.getElementById('ec_'+wid);if(!canvas)return;
    if(activeCharts[wid]){activeCharts[wid].destroy();}
    activeCharts[wid]=new Chart(canvas,{type:'line',data:{labels:data.map(d=>d.date),datasets:[{data:data.map(d=>d.val),borderColor:'#7c6dfa',backgroundColor:'rgba(124,109,250,.1)',tension:.35,pointRadius:5,pointBackgroundColor:'#7c6dfa',fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(255,255,255,.07)'},ticks:{color:'#8888aa',font:{size:11}}},x:{grid:{display:false},ticks:{color:'#8888aa',font:{size:10},maxRotation:45}}}}});
  },60);
}

function urgScore(t){if(t.done)return -1;const pri={critical:100,high:60,medium:30,low:10}[t.priority]||10;const n=daysUntil(t.deadline);let b=0;if(n!==null){if(n<0)b=200;else if(n===0)b=150;else if(n<=1)b=80;else if(n<=3)b=40;else if(n<=7)b=15;}return pri+b;}

      ${i===0?'<div style="font-size:10px;color:var(--red);font-weight:800;letter-spacing:1px;margin-bottom:3px">▶ הכי דחוף</div>':''}
      <div style="font-size:15px;font-weight:600">${t.title}</div>

function saveTask(){

function doneTask(id){const t=(window.State.data.tasks||[]).find(x=>x.id===id);if(t){t.done=true;t.doneDate=todayKey();}window.State.save();toast('כל הכבוד! ✅');window.renderPage('tasks_page');}
function editTask(id){
  const t=(window.State.data.tasks||[]).find(x=>x.id===id);if(!t)return;
  openModal(`<div class="modal-title">עריכה <button class="modal-close" onclick="closeModal()">✕</button></div>

function updTask(id){const t=(window.State.data.tasks||[]).find(x=>x.id===id);if(!t)return;t.title=document.getElementById('tTitle')?.value||t.title;t.priority=document.getElementById('tPri')?.value||t.priority;t.deadline=document.getElementById('tDate')?.value||null;t.note=document.getElementById('tNote')?.value||'';window.State.save();closeModal();toast('עודכן!');window.renderPage('tasks_page');}
function delTask(id){window.State.data.tasks=(window.State.data.tasks||[]).filter(t=>t.id!==id);window.State.save();window.renderPage('tasks_page');}

// ===== FINANCE / TRADING =====
const MONTHS_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function getMonthRate(year,month){
  const key=year+'-'+String(month+1).padStart(2,'0');
  return (window.State.data.tradeSettings&&window.State.data.tradeSettings.monthlyRates&&window.State.data.tradeSettings.monthlyRates[key])||null;
}

function calcMonthStats(year,month){
  const txs=window.State.data.transactions||[];
  const mt=txs.filter(function(t){var d=new Date(t.date);return d.getMonth()===month&&d.getFullYear()===year;});
  function sum(type){return mt.filter(function(t){return t.type===type;}).reduce(function(s,t){return s+t.amount;},0);}
  function cnt(type){return mt.filter(function(t){return t.type===type;}).length;}
  var settings=window.State.data.tradeSettings||{tzedaka:20,taxRate:17};
  var income=sum('withdrawal');
  var expenses=sum('exam_buy')+sum('live_buy')+sum('tool_expense');
  var net=income-expenses;
  var rate=getMonthRate(year,month)||3.7;
  var tzedaka=net>0?net*(settings.tzedaka||20)/100:0;
  var tax=net>0?net*(settings.taxRate||17)/100:0;
  return {income:income,expenses:expenses,net:net,tzedaka:tzedaka,tax:tax,ils:net*rate,rate:rate,
    examBuyCnt:cnt('exam_buy'),examPassCnt:cnt('exam_pass'),examBurnCnt:cnt('exam_burn'),
    liveBurnCnt:cnt('live_burn'),withdrawalCnt:cnt('withdrawal'),
    withdrawal:sum('withdrawal'),tools:sum('tool_expense')};
}

function finance(){
  var now=new Date();
  var cm=now.getMonth(),cy=now.getFullYear();
  var md=calcMonthStats(cy,cm);
  var settings=window.State.data.tradeSettings||{tzedaka:20,taxRate:17,monthlyRates:{}};
  var txs=window.State.data.transactions||[];
  var rules=window.State.data.tradeRules||[];
  var today=todayKey();

    +'<div class="card" style="margin-bottom:12px"><div class="card-title">📅 טבלה שנתית '+cy+'</div>'

    +'<thead><tr style="background:var(--bg4)">'
    +'<td style="padding:7px 8px;font-weight:700;color:var(--txt2)">חודש</td>'
    +'<td style="padding:6px;text-align:center;font-weight:700;color:var(--green)">הכנסות</td>'
    +'<td style="padding:6px;text-align:center;font-weight:700;color:var(--red)">הוצאות</td>'
    +'<td style="padding:6px;text-align:center;font-weight:700">נטו $</td>'
    +'<td style="padding:6px;text-align:center;font-weight:700;color:var(--yellow)">צדקה</td>'
    +'<td style="padding:6px;text-align:center;font-weight:700;color:var(--orange)">מס</td>'
    +'<td style="padding:6px;text-align:center;font-weight:700;color:var(--blue)">₪</td>'
    +'</tr></thead><tbody>'+tableRows+'</tbody></table></div>'
    +'<button class="btn btn-g btn-sm btn-full" style="margin-top:10px" onclick="exportCSV()">📥 ייצא CSV לרואה חשבון</button>'
    +'</div>'

    // Settings
    +'<div class="card" style="margin-bottom:12px"><div class="card-title">⚙️ הגדרות</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
    +'<div class="fg" style="margin:0"><label>% צדקה</label><div style="display:flex;gap:6px;margin-top:5px"><input class="inp" type="number" id="tzSet" value="'+(settings.tzedaka||20)+'" style="margin:0;flex:1"><button class="btn btn-g btn-sm" onclick="saveTradeSettings()">✓</button></div></div>'
    +'<div class="fg" style="margin:0"><label>% מס</label><div style="display:flex;gap:6px;margin-top:5px"><input class="inp" type="number" id="taxSet" value="'+(settings.taxRate||17)+'" style="margin:0;flex:1"><button class="btn btn-g btn-sm" onclick="saveTradeSettings()">✓</button></div></div>'
    +'</div></div>'

    // Recent
    +'<div class="card"><div class="card-title">📋 פעולות אחרונות</div>'+recentTxs+'</div>';
}

function editRates(){
  var rates=(window.State.data.tradeSettings&&window.State.data.tradeSettings.monthlyRates)||{};
  var year=new Date().getFullYear();
  var html='<div class="modal-title">שערי דולר '+year+' <button class="modal-close" onclick="closeModal()">✕</button></div>'
    +'<div style="font-size:12px;color:var(--txt2);margin-bottom:12px">שער נקבע פעם אחת לחודש ולא משתנה</div>';
  for(var i=0;i<12;i++){
    var key=year+'-'+String(i+1).padStart(2,'0');
    var val=(rates[key]||'');
    html+='<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)">'
      +'<span style="font-size:13px;font-weight:600;min-width:70px">'+MONTHS_HE[i]+'</span>'
      +'<input class="inp" type="number" id="rate_'+i+'" value="'+val+'" placeholder="₪/דולר" step="0.01" style="margin:0;flex:1"></div>';
  }
  html+='<button class="btn btn-p btn-full" style="margin-top:14px" onclick="saveRates('+year+')">שמור</button>';
  openModal(html);
}
function saveRates(year){
  if(!window.State.data.tradeSettings)window.State.data.tradeSettings={tzedaka:20,taxRate:17,monthlyRates:{}};
  if(!window.State.data.tradeSettings.monthlyRates)window.State.data.tradeSettings.monthlyRates={};
  for(var i=0;i<12;i++){
    var v=parseFloat(document.getElementById('rate_'+i).value);
    if(v){window.State.data.tradeSettings.monthlyRates[year+'-'+String(i+1).padStart(2,'0')]=v;}
  }
  window.State.save();closeModal();toast('שערים נשמרו!');window.renderPage('finance');
}
function saveTradeSettings(){
  if(!window.State.data.tradeSettings)window.State.data.tradeSettings={tzedaka:20,taxRate:17,monthlyRates:{}};
  window.State.data.tradeSettings.tzedaka=parseFloat(document.getElementById('tzSet').value)||20;
  window.State.data.tradeSettings.taxRate=parseFloat(document.getElementById('taxSet').value)||17;
  window.State.save();toast('נשמר!');window.renderPage('finance');
}
function toggleTradeRule(ruleId){
  var today=todayKey();
  if(!window.State.data.tradeLog)window.State.data.tradeLog={};
  if(!window.State.data.tradeLog[today])window.State.data.tradeLog[today]={};
  window.State.data.tradeLog[today]['rule_'+ruleId]=!window.State.data.tradeLog[today]['rule_'+ruleId];
  window.State.save();window.renderPage('finance');
}
function addTx(){
  var desc=document.getElementById('txDesc').value.trim();
  var type=document.getElementById('txType').value;
  var amount=parseFloat(document.getElementById('txAmt').value)||0;
  if(!desc||!amount){toast('הכנס תיאור וסכום','error');return;}
  window.State.data.transactions.push({id:genId(),date:todayKey(),type:type,desc:desc,amount:amount});
  window.State.save();toast('נוסף!');window.renderPage('finance');
}
function delTx(id){window.State.data.transactions=window.State.data.transactions.filter(function(t){return t.id!==id;});window.State.save();window.renderPage('finance');}
function addRule(){openModal('<div class="modal-title">כלל חדש <button class="modal-close" onclick="closeModal()">✕</button></div><textarea class="inp" id="ruleT" placeholder="הכנס כלל..." rows="3"></textarea><button class="btn btn-p btn-full" onclick="saveRule()">שמור</button>');}
function saveRule(){var text=document.getElementById('ruleT').value.trim();if(!text)return;window.State.data.tradeRules.push({id:genId(),text:text});window.State.save();closeModal();toast('נוסף!');window.renderPage('finance');}
function delRule(id){if(!confirm('למחוק?'))return;window.State.data.tradeRules=window.State.data.tradeRules.filter(function(r){return r.id!==id;});window.State.save();window.renderPage('finance');}
function exportCSV(){
  var txs=window.State.data.transactions||[];
  var settings=window.State.data.tradeSettings||{tzedaka:20,taxRate:17};
  var labels={'exam_buy':'קניית מבחן','exam_pass':'עבר ללייב','exam_burn':'מבחן נשרף','live_buy':'עלות לייב','live_burn':'לייב נשרף','withdrawal':'משיכה','tool_expense':'כלי/תוכנה'};
  var rows=[['תאריך','סוג','תיאור','סכום $','שקל','הכנסה/הוצאה']];
  for(var i=0;i<txs.length;i++){
    var t=txs[i];
    var d=new Date(t.date);
    var rate=getMonthRate(d.getFullYear(),d.getMonth())||3.7;
    rows.push([t.date,labels[t.type]||t.type,t.desc,t.amount.toFixed(2),(t.amount*rate).toFixed(2),t.type==='withdrawal'?'הכנסה':'הוצאה']);
  }
  var cy=new Date().getFullYear();
  rows.push([],[' חודש','הכנסות $','הוצאות $','רווח נטו $','צדקה $','מס $','שקל']);
  for(var m=0;m<12;m++){
    var md=calcMonthStats(cy,m);
    var r=getMonthRate(cy,m)||'';
    var tz=md.net>0?md.net*(settings.tzedaka||20)/100:0;
    var tx=md.net>0?md.net*(settings.taxRate||17)/100:0;
    rows.push([MONTHS_HE[m],md.income.toFixed(2),md.expenses.toFixed(2),md.net.toFixed(2),tz.toFixed(2),tx.toFixed(2),(md.net*(r||3.7)).toFixed(2)]);
  }
  var csv='\uFEFF'+rows.map(function(r){return r.join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='lifeos_trading_'+cy+'.csv';a.click();
  URL.revokeObjectURL(url);toast('CSV יוצא! 📥');
}

  <div class="fg"><label>Bot Token</label><input class="inp" id="tgToken" value="${window.State.data.tg?.token||''}" placeholder="123456:ABCdef..." style="margin:0;direction:ltr;font-family:monospace;font-size:12px"></div>
  <div class="fg" style="margin-top:8px"><label>Chat ID</label><input class="inp" id="tgChatId" value="${window.State.data.tg?.chatId||''}" placeholder="123456789" style="margin:0;direction:ltr"></div>
  <button class="btn btn-p btn-full" style="margin-top:10px" onclick="saveTg()">שמור</button>
  <button class="btn btn-g btn-full" style="margin-top:8px" onclick="sendTest()">שלח הודעת בדיקה</button>
</div>
<div class="card"><div class="card-title">📱 פקודות</div>
  ${[['/status','סיכום יומי'],['/done [משימה]','סיום משימה'],['/weight 82.5','משקל'],['/smoke 8','עדכון ע׳'],['/h 2','עדכון ח׳'],['/income 5000','הכנסה'],['/expense 200','הוצאה'],['/note [טקסט]','יומן']].map(([c,d])=>`<div style="padding:7px 0;border-bottom:1px solid var(--border)"><span style="background:var(--bg4);border:1px solid var(--border2);border-radius:5px;padding:3px 8px;font-family:monospace;font-size:12px;color:var(--accent2)">${c}</span><span style="font-size:12px;color:var(--txt2);margin-right:8px">${d}</span></div>`).join('')}
</div>`;
}
function saveTg(){window.State.data.tg={token:document.getElementById('tgToken')?.value||'',chatId:document.getElementById('tgChatId')?.value||''};window.State.save();toast('נשמר!');}
async function sendTest(){
  const{token,chatId}=window.State.data.tg||{};
  if(!token||!chatId){toast('הכנס Token ו-Chat ID','error');return;}
  const today=todayKey(),score=calcTodayScore(),max=calcTodayMax();
  const text=`⚡ *LifeOS — סיכום יומי*\n\n🏆 נקודות: ${score}/${max}\n💨 ע׳: ${window.State.data.smoke.today} (יעד: ${window.State.data.smoke.goal})\n🛡 ח׳: ${window.State.data.h.today} (יעד: ${window.State.data.h.goal})\n\nהמטרה: +1% כל יום 🚀`;
  try{const r=await fetch(`https://api.telegram.org/bot${token}/sendMessage`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:chatId,text,parse_mode:'Markdown'})});const d=await r.json();d.ok?toast('נשלח! ✅'):toast('שגיאה: '+d.description,'error');}catch(e){toast('שגיאת רשת','error');}
}

// ===== MORE =====
function more(){
  return`<div style="font-size:20px;font-weight:800;margin-bottom:14px">עוד</div>
<div class="card">
  ${[['tasks_page','\u2705 \u05de\u05e9\u05d9\u05de\u05d5\u05ea \u05e4\u05ea\u05d5\u05d7\u05d5\u05ea'],['\u05d2\u05d5\u05d0\u05dc\u05e1','\ud83c\udfaf \u05d9\u05e2\u05d3\u05d9\u05dd'],['journal','\ud83d\udcd3 \u05d9\u05d5\u05de\u05df'],['food','\ud83e\udd57 \u05ea\u05d6\u05d5\u05e0\u05d4'],['progress_page','\ud83d\udcc8 \u05d2\u05e8\u05e3 \u05d4\u05ea\u05e7\u05d3\u05de\u05d5\u05ea'],['telegram','\u2709\ufe0f \u05d1\u05d5\u05d8 Telegram']].map(([p,l])=>`
  <div style="display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);cursor:pointer" onclick="navigate('${p}')">
    <span style="font-size:15px;font-weight:500">${l}</span>
    <i class="fas fa-chevron-left" style="color:var(--txt2);font-size:12px"></i>
  </div>`).join('')}
</div>
<div class="card" style="margin-top:10px">
  <div style="text-align:center;padding:10px">
    <div style="font-size:28px;margin-bottom:8px">\u26a1</div>
    <div style="font-size:16px;font-weight:700;color:var(--accent2)">\u05d4\u05de\u05d8\u05e8\u05d4: +1% \u05db\u05dc \u05d9\u05d5\u05dd</div>
    <div style="font-size:12px;color:var(--txt2);margin-top:4px">\u05e2\u05e7\u05d1\u05d9\u05d5\u05ea > \u05e9\u05dc\u05de\u05d5\u05ea</div>
    <div style="font-size:22px;font-weight:900;color:var(--yellow);margin-top:12px">${calcMonthScore()} \u05e0\u05e7'</div>
    <div style="font-size:11px;color:var(--txt2)">\u05e0\u05e7\u05d5\u05d3\u05d5\u05ea \u05d4\u05d7\u05d5\u05d3\u05e9</div>
  </div>
</div>`;
}

let progressChart=null;
function progress_page(){
  const log=window.State.data.dailyLog||{};
  const tasks=window.State.data.dailyTasks||[];
  const days=[];
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=d.toISOString().split('T')[0];
    const dow=d.getDay();
    const dayTasks=tasks.filter(t=>t.days.includes(dow));
    const maxPts=dayTasks.reduce((s,t)=>s+(t.pts||1),0);
    const donePts=dayTasks.filter(t=>(log[key]||{})[t.id]).reduce((s,t)=>s+(t.pts||1),0);
    const pct=maxPts>0?Math.round(donePts/maxPts*100):0;
    days.push({key,label:d.toLocaleDateString('he-IL',{day:'numeric',month:'short'}),pts:donePts,max:maxPts,pct});
  }
  const activeDays=days.filter(d=>d.max>0);
  const avg=activeDays.length?Math.round(activeDays.reduce((s,d)=>s+d.pct,0)/activeDays.length):0;
  const best=days.reduce((b,d)=>d.pts>b.pts?d:b,{pts:0,label:''});
  let streak=0;for(let i=days.length-1;i>=0;i--){if(days[i].max===0)continue;if(days[i].pct>=50)streak++;else break;}
  const monthScore=calcMonthScore();

  return`
<div style="font-size:20px;font-weight:800;margin-bottom:16px">\ud83d\udcc8 \u05d2\u05e8\u05e3 \u05d4\u05ea\u05e7\u05d3\u05de\u05d5\u05ea</div>
<div class="g2" style="margin-bottom:10px">
  <div class="metric"><div class="val" style="color:var(--accent2)">${monthScore}</div><div class="lbl">\u05e0\u05e7' \u05d4\u05d7\u05d5\u05d3\u05e9</div></div>
  <div class="metric"><div class="val" style="color:var(--green)">${avg}%</div><div class="lbl">\u05de\u05de\u05d5\u05e6\u05e2 30 \u05d9\u05d5\u05dd</div></div>
</div>
<div class="g2" style="margin-bottom:14px">
  <div class="metric"><div class="val" style="color:var(--orange)">${streak}</div><div class="lbl">\ud83d\udd25 \u05e8\u05e6\u05e3 \u05e0\u05d5\u05db\u05d7\u05d9</div></div>
  <div class="metric"><div class="val" style="color:var(--yellow)">${best.pts}</div><div class="lbl">\u05e9\u05d9\u05d0 \u05d9\u05d5\u05de\u05d9</div></div>
</div>
<div class="card" style="margin-bottom:12px">
  <div class="card-title">\ud83d\udcca \u05e0\u05e7\u05d5\u05d3\u05d5\u05ea \u05d9\u05d5\u05de\u05d9\u05d5\u05ea \u2014 30 \u05d9\u05d5\u05dd \u05d0\u05d7\u05e8\u05d5\u05e0\u05d9\u05dd</div>
  <div style="position:relative;height:180px"><canvas id="progressCanvas"></canvas></div>
</div>
<div class="card" style="margin-bottom:12px">
  <div class="card-title">% \u05d4\u05e9\u05dc\u05de\u05d4 \u2014 \u05e7\u05d5 70% \u05d4\u05d9\u05e2\u05d3</div>
  <div style="position:relative;height:160px"><canvas id="pctCanvas"></canvas></div>
</div>
<div class="card">
  <div class="card-title">\ud83d\udcc5 \u05dc\u05d5\u05d7 \u05d9\u05de\u05d9\u05dd</div>
  <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">
    ${days.map(d=>{
      const col=d.max===0?'var(--bg4)':d.pct>=80?'var(--green)':d.pct>=50?'var(--yellow)':d.pts>0?'var(--orange)':'var(--bg4)';
      return`<div title="${d.label}: ${d.pts}/${d.max}" style="width:28px;height:28px;border-radius:5px;background:${col};display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(0,0,0,.6);font-weight:700">${d.pts||''}</div>`;
    }).join('')}
  </div>
  <div style="display:flex;gap:12px;margin-top:10px;font-size:11px;color:var(--txt2);flex-wrap:wrap">
    <span>\u2b1c \u05e8\u05d9\u05e7</span>
    <span style="color:var(--orange)">\u25a7 &lt;50%</span>
    <span style="color:var(--yellow)">\u25a7 50-79%</span>
    <span style="color:var(--green)">\u25a7 80%+</span>
  </div>
</div>`;
}
function drawProgressCharts(){
  const log=window.State.data.dailyLog||{};
  const tasks=window.State.data.dailyTasks||[];
  const days=[];
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=d.toISOString().split('T')[0];
    const dow=d.getDay();
    const dt=tasks.filter(t=>t.days.includes(dow));
    const maxPts=dt.reduce((s,t)=>s+(t.pts||1),0);
    const donePts=dt.filter(t=>(log[key]||{})[t.id]).reduce((s,t)=>s+(t.pts||1),0);
    days.push({label:d.toLocaleDateString('he-IL',{day:'numeric',month:'short'}),pts:donePts,pct:maxPts>0?Math.round(donePts/maxPts*100):0});
  }
  const baseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(255,255,255,.06)'},ticks:{color:'#9090b8',font:{size:10}}},x:{grid:{display:false},ticks:{color:'#9090b8',font:{size:9},maxRotation:45,maxTicksLimit:10}}}};
  const c1=document.getElementById('progressCanvas');
  if(c1){if(progressChart)progressChart.destroy();progressChart=new Chart(c1,{type:'bar',data:{labels:days.map(d=>d.label),datasets:[{data:days.map(d=>d.pts),backgroundColor:days.map(d=>d.pct>=80?'rgba(16,217,160,.75)':d.pct>=50?'rgba(251,191,36,.75)':d.pts>0?'rgba(249,115,22,.75)':'rgba(255,255,255,.05)'),borderRadius:4}]},options:baseOpts});}
  const c2=document.getElementById('pctCanvas');
  if(c2){new Chart(c2,{type:'line',data:{labels:days.map(d=>d.label),datasets:[{data:days.map(d=>d.pct),borderColor:'#7c6dfa',backgroundColor:'rgba(124,109,250,.1)',tension:.3,pointRadius:3,fill:true},{label:'יעד 70%',data:days.map(()=>70),borderColor:'rgba(16,217,160,.5)',borderDash:[5,3],pointRadius:0,borderWidth:1.5}]},options:{...baseOpts,scales:{...baseOpts.scales,y:{...baseOpts.scales.y,max:100,ticks:{callback:v=>v+'%',color:'#9090b8',font:{size:10}}}}}});}
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.bnav').forEach(item=>{
    item.addEventListener('click',()=>navigate(item.dataset.page));
  });
  window.updateUI();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
});
</script>
</body>
